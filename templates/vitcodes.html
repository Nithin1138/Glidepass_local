<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LANPAD | VIT-AP Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #FAFAFA;
            --text-muted: rgba(250, 250, 250, 0.4);
            --accent-color: #0077C0;
            --accent-glow: rgba(0, 119, 192, 0.3);
            --indigo-glow: rgba(199, 238, 255, 0.15);
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-display: 'Outfit', -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        #app-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .space-bg {
            position: absolute;
            inset: 0;
            background: #000000;
            overflow: hidden;
            z-index: -2;
            pointer-events: none;
        }

        .nebula {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 30%, var(--accent-glow) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, var(--indigo-glow) 0%, transparent 40%);
            filter: blur(60px);
            animation: nebula-drift 30s infinite alternate linear;
            pointer-events: none;
        }

        @keyframes nebula-drift {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(30deg) scale(1.1); }
        }

        /* Views */
        .view {
            width: 100%;
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 20px;
            z-index: 2;
        }

        .view.active {
            display: flex;
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header styling */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            padding: 15px 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #fff;
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            background: linear-gradient(to right, #ffffff, rgba(255, 255, 255, 0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .portal-badge {
            font-family: var(--font-display);
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 9999px;
            border: 1px solid rgba(0, 155, 245, 0.3);
            background: rgba(0, 119, 192, 0.15);
            color: #009BF5;
            box-shadow: 0 0 15px rgba(0, 119, 192, 0.2);
        }

        /* Hero */
        .hero {
            text-align: center;
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .ota-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #ffffff, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 320px;
            line-height: 1.4;
        }

        /* List view */
        .sessions-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .session-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            color: inherit;
            display: block;
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .session-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 155, 245, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 119, 192, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }
        
        .session-card:active {
            transform: scale(0.96);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .exam-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            font-family: var(--font-display);
            letter-spacing: 0.1em;
            background: rgba(0, 119, 192, 0.15);
            color: #009BF5;
            border: 1px solid rgba(0, 155, 245, 0.3);
            padding: 4px 10px;
            border-radius: 9999px;
            box-shadow: 0 0 10px rgba(0, 119, 192, 0.15);
        }

        .session-date {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .session-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .card-footer span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Detail view styles */
        .session-info {
            margin-bottom: 24px;
        }

        .session-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .session-meta-row .accent {
            color: var(--accent-color);
            font-weight: 600;
        }

        .session-heading {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 850;
            letter-spacing: -0.02em;
        }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .question-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }

        .q-header {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .q-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .q-title {
            font-size: 0.8rem;
            font-weight: 700;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.7);
        }

        .q-lang {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.6);
        }

        .code-container {
            position: relative;
            background: #000;
            border: 1px solid var(--border-color);
            margin: 16px;
            border-radius: 12px;
            overflow: hidden;
        }

        .code-pre {
            padding: 16px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.7rem;
            line-height: 1.5;
            color: #a7f3d0;
            max-height: 250px;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .copy-btn.copied {
            color: var(--accent-color);
            border-color: rgba(0, 119, 192, 0.3);
        }

        .dispatch-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: calc(100% - 32px);
            margin: 0 16px 16px 16px;
            padding: 12px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #009BF5 100%);
            color: #ffffff;
            border: none;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--accent-glow), inset 0 2px 4px rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dispatch-btn:hover {
            opacity: 0.9;
        }

        .dispatch-btn:active {
            transform: scale(0.96);
        }

        /* Utilities */
        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            gap: 12px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--accent-color);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message, .empty-message {
            text-align: center;
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.01);
            margin: 20px 0;
        }

        .error-message {
            color: #f87171;
        }

        .empty-message {
            color: var(--text-muted);
        }

        .dispatch-text-mobile {
            display: none;
        }

        @media (max-width: 480px) {
            .dispatch-text-desktop {
                display: none !important;
            }
            .dispatch-text-mobile {
                display: inline !important;
            }
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div class="space-bg">
            <div class="nebula"></div>
        </div>

        <header>
            <div class="header-content">
                <div class="header-left">
                    <button class="back-btn" id="header-back-btn">
                        <i data-lucide="arrow-left" size="18"></i>
                    </button>
                    <span class="logo-text">LANPAD</span>
                    <span class="portal-badge">VIT-AP</span>
                </div>
            </div>
        </header>

        <!-- View 1: Overview Grid of Sessions -->
        <div class="view active" id="overview-view">
            <div class="hero">
                <div class="ota-badge">
                    <i data-lucide="sparkles" size="12" style="color: var(--accent-color);"></i>
                    <span>Over-The-Air Code Repository</span>
                </div>
                <h1>VIT-AP Today's Codes</h1>
                <p>Select your exam session, copy questions directly, or dispatch code straight to your laptop's clipboard.</p>
            </div>

            <div class="sessions-grid" id="sessions-grid">
                <!-- Loaded dynamically -->
            </div>
        </div>

        <!-- View 2: Detailed Questions for Session -->
        <div class="view" id="detail-view">
            <div class="session-info">
                <div class="session-meta-row">
                    <span class="accent" id="detail-exam-type">--</span>
                </div>
                <h1 class="session-heading" id="detail-heading">Session Questions</h1>
            </div>

            <div class="questions-list" id="questions-list">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <script>
        let allSessions = [];
        let currentView = 'overview'; // 'overview' or 'detail'
        let currentSessionId = null;

        // Header Back Button Logic
        const backBtn = document.getElementById('header-back-btn');
        backBtn.addEventListener('click', () => {
            if (currentView === 'detail') {
                showOverview();
            } else {
                window.location.href = '/';
            }
        });

        // Initialize Lucide Icons
        function refreshIcons() {
            lucide.createIcons();
        }

        // Show Overview View
        function showOverview() {
            currentView = 'overview';
            currentSessionId = null;
            document.getElementById('detail-view').classList.remove('active');
            document.getElementById('overview-view').classList.add('active');
        }

        // Show Detailed View
        function showDetail(sessionId) {
            currentView = 'detail';
            currentSessionId = sessionId;
            const session = allSessions.find(s => s.id === sessionId);
            if (!session) return;

            // Fill meta info
            document.getElementById('detail-exam-type').textContent = session.examType;
            document.getElementById('detail-heading').textContent = `${session.title || session.examType} Questions`;

            const qListDiv = document.getElementById('questions-list');
            qListDiv.innerHTML = '';

            session.questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="q-header" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
                        <div class="q-title-wrap" style="display: flex; align-items: center; gap: 8px; min-w-0; margin-right: 12px;">
                            <i data-lucide="terminal" size="14" style="color: var(--accent-color); flex-shrink: 0;"></i>
                            <span class="q-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Question ${idx + 1}: ${q.title}</span>
                        </div>
                        <div class="q-header-actions" style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
                            <button class="copy-btn-header" data-code="${encodeURIComponent(q.code)}" data-qid="${q.id}" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); padding: 4px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">
                                <i data-lucide="copy" size="12"></i>
                            </button>
                            <span class="q-lang">${q.language}</span>
                            <i class="chevron-icon" data-lucide="chevron-down" size="14" style="opacity: 0.6;"></i>
                        </div>
                    </div>
                    <div class="q-body" style="display: none; border-top: 1px solid var(--border-color);">
                        <div class="code-container" style="margin: 16px;">
                            <pre class="code-pre"><code>${escapeHtml(q.code)}</code></pre>
                        </div>
                    </div>
                    <div class="q-actions" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border-color); gap: 12px;">
                        <span class="contributor-name" style="font-size: 0.65rem; color: var(--text-muted); font-family: monospace; text-align: left; max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            ${q.contributorName ? `Contributed by: <strong style="color: #ffffff;">${q.contributorName}</strong>` : ''}
                        </span>
                        <button class="dispatch-btn" data-code="${encodeURIComponent(q.code)}" style="margin: 0; padding: 4px 8px; font-size: 0.58rem; width: auto; text-transform: none; font-weight: 600; display: inline-flex; align-items: center; gap: 4px;">
                            <i data-lucide="send" size="10"></i>
                            <span>Command Center</span>
                        </button>
                    </div>
                `;

                // Add Toggle expansion event listener
                card.querySelector('.q-header').addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    const body = card.querySelector('.q-body');
                    const chevron = card.querySelector('.chevron-icon');
                    const isOpen = body.style.display === 'block';
                    if (isOpen) {
                        body.style.display = 'none';
                        chevron.setAttribute('data-lucide', 'chevron-down');
                    } else {
                        body.style.display = 'block';
                        chevron.setAttribute('data-lucide', 'chevron-up');
                    }
                    refreshIcons();
                });

                qListDiv.appendChild(card);
            });

            // Set up copy and dispatch actions
            qListDiv.querySelectorAll('.copy-btn-header').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const code = decodeURIComponent(btn.getAttribute('data-code'));
                    navigator.clipboard.writeText(code).then(() => {
                        btn.classList.add('copied');
                        btn.style.color = 'var(--accent-color)';
                        btn.style.borderColor = 'rgba(0, 119, 192, 0.3)';
                        btn.innerHTML = `<i data-lucide="check" size="12"></i>`;
                        refreshIcons();
                        setTimeout(() => {
                            btn.classList.remove('copied');
                            btn.style.color = 'rgba(255,255,255,0.5)';
                            btn.style.borderColor = 'rgba(255,255,255,0.1)';
                            btn.innerHTML = `<i data-lucide="copy" size="12"></i>`;
                            refreshIcons();
                        }, 2000);
                    });
                });
            });

            qListDiv.querySelectorAll('.dispatch-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const code = decodeURIComponent(btn.getAttribute('data-code'));
                    window.location.href = `/center?code=${encodeURIComponent(code)}`;
                });
            });

            document.getElementById('overview-view').classList.remove('active');
            document.getElementById('detail-view').classList.add('active');
            refreshIcons();
        }

        // Fetch Sessions
        function loadSessions() {
            const grid = document.getElementById('sessions-grid');
            grid.innerHTML = `
                <div class="loader-wrap">
                    <div class="spinner"></div>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">Fetching latest sessions...</span>
                </div>
            `;

            fetch('/api/vitcodes')
                .then(r => {
                    if (!r.ok) throw new Error('Failed to load session codes');
                    return r.json();
                })
                .then(data => {
                    allSessions = data;
                    // Group sessions by examType
                    const groups = {};
                    data.forEach(s => {
                        if (!groups[s.examType]) groups[s.examType] = [];
                        groups[s.examType].push(s);
                    });
                    // Render exam type cards
                    grid.innerHTML = '';
                    Object.entries(groups).forEach(([type, sessions]) => {
                        const typeCard = document.createElement('div');
                        typeCard.className = 'session-card';
                        const count = sessions.length;
                        const dates = sessions.map(s => s.date);
                        const earliest = dates.reduce((a,b) => a < b ? a : b, dates[0]);
                        const latest = dates.reduce((a,b) => a > b ? a : b, dates[0]);
                        const daysInfo = earliest && latest ? `${earliest} → ${latest}` : '';
                        typeCard.innerHTML = `
                            <div class="card-top">
                                <div class="exam-badge">
                                    <i data-lucide="award" size="10"></i>
                                    <span>${type}</span>
                                </div>
                            </div>
                            <h3 class="session-title">${type}</h3>
                            <p class="session-date"><i data-lucide="calendar" size="12"></i> ${daysInfo}</p>
                            <div class="card-footer">
                                <span>
                                    <i data-lucide="code-2" size="12"></i>
                                    ${count} Session${count > 1 ? 's' : ''}
                                </span>
                                <i data-lucide="chevron-right" size="14"></i>
                            </div>
                        `;
                        typeCard.addEventListener('click', () => {
                            // Render sessions for this exam type
                            renderSessions(sessions);
                        });
                        grid.appendChild(typeCard);
                    });
                    refreshIcons();
                })
                .catch(err => {
                    grid.innerHTML = `
                        <div class="error-message">
                            <span style="font-size: 0.85rem;">${err.message || 'Failed to load VIT-AP codes.'}</span>
                        </div>
                    `;
                });

            function renderSessions(sessions) {
                const grid = document.getElementById('sessions-grid');
                grid.innerHTML = '';
                if (sessions.length === 0) {
                    grid.innerHTML = `<div class="empty-message"><span style="font-size: 0.85rem;">No sessions for this exam type.</span></div>`;
                    return;
                }
                sessions.forEach(session => {
                    const card = document.createElement('div');
                    card.className = 'session-card';
                    const titleHTML = session.title ? `<h3 class="session-title">${session.title}</h3>` : `<h3 class="session-title">${session.date}</h3>`;
                    const dateHTML = session.title ? `<p class="session-date"><i data-lucide="calendar" size="12"></i> ${session.date}</p>` : '';
                    card.innerHTML = `
                        <div class="card-top">
                            <div class="exam-badge">
                                <i data-lucide="award" size="10"></i>
                                <span>${session.examType}</span>
                            </div>
                        </div>
                        ${titleHTML}
                        ${dateHTML}
                        <div class="card-footer">
                            <span>
                                <i data-lucide="code-2" size="12"></i>
                                ${session.questions.length} Question${session.questions.length > 1 ? 's' : ''} Available
                            </span>
                            <i data-lucide="chevron-right" size="14"></i>
                        </div>
                    `;
                    card.addEventListener('click', () => showDetail(session.id));
                    grid.appendChild(card);
                });
                refreshIcons();
            }
        }

        // Escape HTML helper
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Boot
        window.addEventListener('DOMContentLoaded', () => {
            loadSessions();
            refreshIcons();
        });

        // Connect to active status websocket
        function connectWebSocket() {
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${proto}//${window.location.host}/ws/connect`;
            const ws = new WebSocket(wsUrl);
            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };
            ws.onerror = () => {
                ws.close();
            };
        }
        connectWebSocket();
    </script>
</body>
</html>
