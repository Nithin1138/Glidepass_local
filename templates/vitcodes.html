<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLIDEPASS | VIT-AP Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(18, 18, 18, 0.6);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #F5F5F5;
            --text-muted: #A0AEC0;
            --accent-color: #48BB78;
            --accent-glow: rgba(72, 187, 120, 0.15);
            --indigo-glow: rgba(99, 102, 241, 0.15);
            --font-main: 'Inter', -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        #app-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .space-bg {
            position: absolute;
            inset: 0;
            background: #000000;
            overflow: hidden;
            z-index: -2;
            pointer-events: none;
        }

        .nebula {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 30%, var(--accent-glow) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, var(--indigo-glow) 0%, transparent 40%);
            filter: blur(60px);
            animation: nebula-drift 30s infinite alternate linear;
            pointer-events: none;
        }

        @keyframes nebula-drift {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(30deg) scale(1.1); }
        }

        /* Views */
        .view {
            width: 100%;
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 20px;
            z-index: 2;
        }

        .view.active {
            display: flex;
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header styling */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            width: 100%;
            padding: 15px 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #fff;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            background: linear-gradient(to right, #ffffff, rgba(255, 255, 255, 0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .portal-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 9999px;
            border: 1px solid rgba(72, 187, 120, 0.3);
            background: rgba(72, 187, 120, 0.1);
            color: var(--accent-color);
        }

        /* Hero */
        .hero {
            text-align: center;
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .ota-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .hero h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #ffffff, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 320px;
            line-height: 1.4;
        }

        /* List view */
        .sessions-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .session-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .session-card:hover {
            border-color: rgba(72, 187, 120, 0.3);
            transform: translateY(-2px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .exam-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            background: rgba(72, 187, 120, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(72, 187, 120, 0.2);
            padding: 4px 10px;
            border-radius: 9999px;
        }

        .session-date {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .session-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .card-footer span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Detail view styles */
        .session-info {
            margin-bottom: 24px;
        }

        .session-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .session-meta-row .accent {
            color: var(--accent-color);
            font-weight: 600;
        }

        .session-heading {
            font-size: 1.6rem;
            font-weight: 850;
            letter-spacing: -0.02em;
        }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.01);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .q-header {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .q-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .q-title {
            font-size: 0.8rem;
            font-weight: 700;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.7);
        }

        .q-lang {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.6);
        }

        .code-container {
            position: relative;
            background: #000;
            border: 1px solid var(--border-color);
            margin: 16px;
            border-radius: 12px;
            overflow: hidden;
        }

        .code-pre {
            padding: 16px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.7rem;
            line-height: 1.5;
            color: #a7f3d0;
            max-height: 250px;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .copy-btn.copied {
            color: var(--accent-color);
            border-color: rgba(72, 187, 120, 0.3);
        }

        .dispatch-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: calc(100% - 32px);
            margin: 0 16px 16px 16px;
            padding: 12px;
            border-radius: 12px;
            background: #16a34a;
            color: white;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.1);
            transition: all 0.2s;
        }

        .dispatch-btn:hover {
            background: #15803d;
        }

        .dispatch-btn:active {
            transform: scale(0.98);
        }

        /* Utilities */
        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            gap: 12px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--accent-color);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message, .empty-message {
            text-align: center;
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.01);
            margin: 20px 0;
        }

        .error-message {
            color: #f87171;
        }

        .empty-message {
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div class="space-bg">
            <div class="nebula"></div>
        </div>

        <header>
            <div class="header-content">
                <div class="header-left">
                    <button class="back-btn" id="header-back-btn">
                        <i data-lucide="arrow-left" size="18"></i>
                    </button>
                    <span class="logo-text">GLIDEPASS</span>
                    <span class="portal-badge">VIT-AP</span>
                </div>
            </div>
        </header>

        <!-- View 1: Overview Grid of Sessions -->
        <div class="view active" id="overview-view">
            <div class="hero">
                <div class="ota-badge">
                    <i data-lucide="sparkles" size="12" style="color: var(--accent-color);"></i>
                    <span>Over-The-Air Code Repository</span>
                </div>
                <h1>VIT-AP Today's Codes</h1>
                <p>Select your exam session, copy questions directly, or dispatch code straight to your laptop's clipboard.</p>
            </div>

            <div class="sessions-grid" id="sessions-grid">
                <!-- Loaded dynamically -->
            </div>
        </div>

        <!-- View 2: Detailed Questions for Session -->
        <div class="view" id="detail-view">
            <div class="session-info">
                <div class="session-meta-row">
                    <span id="detail-date">--</span>
                    <span>•</span>
                    <span class="accent" id="detail-exam-type">--</span>
                </div>
                <h1 class="session-heading" id="detail-heading">Session Questions</h1>
            </div>

            <div class="questions-list" id="questions-list">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <script>
        let allSessions = [];
        let currentView = 'overview'; // 'overview' or 'detail'
        let currentSessionId = null;

        // Header Back Button Logic
        const backBtn = document.getElementById('header-back-btn');
        backBtn.addEventListener('click', () => {
            if (currentView === 'detail') {
                showOverview();
            } else {
                window.location.href = '/';
            }
        });

        // Initialize Lucide Icons
        function refreshIcons() {
            lucide.createIcons();
        }

        // Show Overview View
        function showOverview() {
            currentView = 'overview';
            currentSessionId = null;
            document.getElementById('detail-view').classList.remove('active');
            document.getElementById('overview-view').classList.add('active');
        }

        // Show Detailed View
        function showDetail(sessionId) {
            currentView = 'detail';
            currentSessionId = sessionId;
            const session = allSessions.find(s => s.id === sessionId);
            if (!session) return;

            // Fill meta info
            document.getElementById('detail-date').textContent = session.date;
            document.getElementById('detail-exam-type').textContent = session.examType;
            document.getElementById('detail-heading').textContent = `${session.examType} Questions`;

            const qListDiv = document.getElementById('questions-list');
            qListDiv.innerHTML = '';

            session.questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="q-header">
                        <div class="q-title-wrap">
                            <i data-lucide="terminal" size="14" style="color: var(--accent-color);"></i>
                            <span class="q-title">Question ${idx + 1}: ${q.title}</span>
                        </div>
                        <span class="q-lang">${q.language}</span>
                    </div>
                    <div class="code-container">
                        <button class="copy-btn" data-code="${encodeURIComponent(q.code)}" data-qid="${q.id}">
                            <i data-lucide="copy" size="13"></i>
                        </button>
                        <pre class="code-pre"><code>${escapeHtml(q.code)}</code></pre>
                    </div>
                    <button class="dispatch-btn" data-code="${encodeURIComponent(q.code)}">
                        <i data-lucide="send" size="13"></i>
                        Enter Command Center with Code
                    </button>
                `;
                qListDiv.appendChild(card);
            });

            // Set up copy and dispatch actions
            qListDiv.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const code = decodeURIComponent(btn.getAttribute('data-code'));
                    navigator.clipboard.writeText(code).then(() => {
                        btn.classList.add('copied');
                        btn.innerHTML = `<i data-lucide="check" size="13"></i>`;
                        refreshIcons();
                        setTimeout(() => {
                            btn.classList.remove('copied');
                            btn.innerHTML = `<i data-lucide="copy" size="13"></i>`;
                            refreshIcons();
                        }, 2000);
                    });
                });
            });

            qListDiv.querySelectorAll('.dispatch-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const code = decodeURIComponent(btn.getAttribute('data-code'));
                    window.location.href = `/center?code=${encodeURIComponent(code)}`;
                });
            });

            document.getElementById('overview-view').classList.remove('active');
            document.getElementById('detail-view').classList.add('active');
            refreshIcons();
        }

        // Fetch Sessions
        function loadSessions() {
            const grid = document.getElementById('sessions-grid');
            grid.innerHTML = `
                <div class="loader-wrap">
                    <div class="spinner"></div>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">Fetching latest sessions...</span>
                </div>
            `;

            fetch('/api/vitcodes')
                .then(r => {
                    if (!r.ok) throw new Error('Failed to load session codes');
                    return r.json();
                })
                .then(data => {
                    allSessions = data;
                    grid.innerHTML = '';
                    if (data.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-message">
                                <span style="font-size: 0.85rem;">No exam codes added yet.</span>
                            </div>
                        `;
                        return;
                    }

                    data.forEach(session => {
                        const card = document.createElement('div');
                        card.className = 'session-card';
                        card.innerHTML = `
                            <div class="card-top">
                                <div class="exam-badge">
                                    <i data-lucide="award" size="10"></i>
                                    <span>${session.examType}</span>
                                </div>
                                <div class="session-date">
                                    <i data-lucide="calendar" size="12"></i>
                                    <span>${session.date}</span>
                                </div>
                            </div>
                            <h3 class="session-title">${session.examType} Session</h3>
                            <div class="card-footer">
                                <span>
                                    <i data-lucide="code-2" size="12"></i>
                                    ${session.questions.length} Question${session.questions.length > 1 ? 's' : ''} Available
                                </span>
                                <i data-lucide="chevron-right" size="14"></i>
                            </div>
                        `;
                        card.addEventListener('click', () => showDetail(session.id));
                        grid.appendChild(card);
                    });
                    refreshIcons();
                })
                .catch(err => {
                    grid.innerHTML = `
                        <div class="error-message">
                            <span style="font-size: 0.85rem;">${err.message || 'Failed to load VIT-AP codes.'}</span>
                        </div>
                    `;
                });
        }

        // Escape HTML helper
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Boot
        window.addEventListener('DOMContentLoaded', () => {
            loadSessions();
            refreshIcons();
        });
    </script>
</body>
</html>
