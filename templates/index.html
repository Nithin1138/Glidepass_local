<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LANpad Mobile Command</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #FAFAFA;
            --text-muted: rgba(250, 250, 250, 0.4);
            --accent-color: #0077C0;
            --accent-glow: rgba(0, 119, 192, 0.3);
            --red-status: #C62828;
            --green-status: #C7EEFF;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-display: 'Outfit', -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        #app-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
        }

        .view {
            width: 100%;
            flex: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: none;
            flex-direction: column;
            padding: 15px;
            /* Reduced padding */
        }

        .view.active {
            opacity: 1;
            pointer-events: auto;
            display: flex;
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .space-bg {
            position: absolute;
            inset: 0;
            background: #000000;
            overflow: hidden;
            z-index: 0;
        }

        .nebula {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 119, 192, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 30% 70%, rgba(199, 238, 255, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 70% 30%, rgba(0, 119, 192, 0.08) 0%, transparent 35%);
            filter: blur(40px);
            animation: nebula-drift 30s infinite alternate linear;
            pointer-events: none;
        }

        @keyframes nebula-drift {
            0% {
                transform: rotate(0deg) scale(1);
            }

            100% {
                transform: rotate(30deg) scale(1.1);
            }
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
        }

        .layer1 {
            background-image:
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, rgba(255, 255, 255, 0.8), rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 160px 120px, rgba(255, 255, 255, 0.6), rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: star-drift-1 40s linear infinite;
            opacity: 0.9;
        }

        .layer2 {
            background-image:
                radial-gradient(1px 1px at 50px 100px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 100px 200px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 150px 50px, rgba(255, 255, 255, 0.7), rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 200px 150px, rgba(255, 255, 255, 0.5), rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 250px 250px, #fff, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 300px 300px;
            animation: star-drift-2 70s linear infinite;
            opacity: 0.6;
        }

        .layer3 {
            background-image:
                radial-gradient(1px 1px at 100px 50px, rgba(255, 255, 255, 0.5), rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 200px 150px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 300px 300px, rgba(255, 255, 255, 0.4), rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 350px 100px, rgba(255, 255, 255, 0.8), rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: star-drift-3 100s linear infinite;
            opacity: 0.4;
        }

        @keyframes star-drift-1 {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 -400px;
            }
        }

        @keyframes star-drift-2 {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 -600px;
            }
        }

        @keyframes star-drift-3 {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 -800px;
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Initial View */
        .onboarding {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex: 1;
            gap: 24px;
            z-index: 1;
        }

        .logo-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .zap-icon {
            color: var(--accent-color);
            filter: drop-shadow(0 0 15px var(--accent-color));
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .hero-section h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.05em;
        }

        .hero-section p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .connect-btn-main {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-color) 0%, #009BF5 100%);
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            box-shadow: 0 10px 30px var(--accent-glow), inset 0 2px 4px rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .connect-btn-main:active {
            transform: scale(0.96);
        }

        /* Command Center View */
        .command-center {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 20px;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green-status);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green-status);
        }

        .controls-row {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            padding: 12px 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .header-btn:active {
            transform: scale(0.95);
        }

        .header-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .disconnect-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--red-status);
        }

        .injection-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .textarea-wrapper {
            position: relative;
            height: 180px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s ease;
        }
        
        .textarea-wrapper:focus-within {
            border-color: rgba(199, 238, 255, 0.3);
        }

        #countdown-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .timer-circle {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .timer-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-color);
        }

        .timer-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea:disabled {
            color: var(--border-color);
        }

        .primary-action:disabled {
            background: #222;
            color: var(--border-color);
            box-shadow: none;
            cursor: not-allowed;
        }

        .status-message {
            display: flex;
            gap: 8px;
            font-size: 0.75rem;
            color: #555;
            line-height: 1.4;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .mode-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .mode-card:active {
            transform: scale(0.95);
        }

        .mode-card.active,
        .header-btn.active {
            background: var(--accent-glow) !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 20px var(--accent-glow) !important;
            color: #fff !important;
        }

        .mode-card.active .mode-title {
            color: var(--accent-color);
        }

        .mode-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .mode-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
        }

        .mode-card p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* WPM Selector Styles */
        .wpm-selector-row {
            padding: 5px 0;
            animation: fadeIn 0.3s ease;
        }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .primary-action {
            background: linear-gradient(135deg, var(--accent-color), var(--green-status));
            color: #050505;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 20px var(--accent-glow), inset 0 2px 4px rgba(255,255,255,0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .primary-action:active {
            transform: scale(0.96);
        }

        .footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .footer-actions button {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            color: var(--text-main);
            padding: 14px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .footer-actions button:active {
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4d4d;
            /* Base red for claymorphic error */
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 800;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 1000;
            border: none;
            /* Claymorphic 3D shadow effect */
            box-shadow:
                6px 6px 12px rgba(0, 0, 0, 0.4),
                -2px -2px 8px rgba(255, 255, 255, 0.05),
                inset 4px 4px 10px rgba(255, 255, 255, 0.4),
                inset -4px -4px 10px rgba(0, 0, 0, 0.2);
        }

        .toast.success {
            background: var(--accent-color);
            /* Blue for success */
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-height: 700px) {
            .hero-section h1 {
                font-size: 1.5rem;
            }

            .textarea-wrapper {
                padding: 12px;
            }

            textarea {
                font-size: 0.95rem;
            }

            .primary-action {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div id="app-wrapper">
        <!-- Initial View -->
        <div id="initial-view" class="view active" style="overflow: hidden; position: relative;">
            <div class="space-bg">
                <div class="nebula"></div>
                <div class="stars layer1"></div>
                <div class="stars layer2"></div>
                <div class="stars layer3"></div>
            </div>
            <div class="onboarding" style="position: relative; z-index: 1;">
                <div class="logo-stack">
                    <div
                        style="width: 80px; height: 80px; background: var(--bg-color); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; shadow: 0 20px 40px rgba(0,0,0,0.5); margin-bottom: 20px;">
                        <img src="/logo.png" alt="Logo"
                            style="width: 130%; height: 130%; object-fit: contain; filter: invert(1) hue-rotate(180deg) brightness(1.2);" />
                    </div>
                    <span class="logo-text">LANPAD</span>
                </div>
                <div class="hero-section">
                    <h1>Linked Up</h1>
                    <p>Connected to laptop command center. Ready to bridge your data.</p>
                </div>
                <button class="connect-btn-main" id="launch-btn">
                    <span>ENTER COMMAND CENTER</span>
                    <i data-lucide="chevron-right" size="20"></i>
                </button>
                <button class="connect-btn-main" id="vit-btn"
                    style="margin-top: 15px; background: rgba(72, 187, 120, 0.1); border: 1px solid var(--accent-color); color: var(--accent-color);">
                    <span>VIT-AP (Today's code)</span>
                    <i data-lucide="code" size="20"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        const launchBtn = document.getElementById('launch-btn');
        launchBtn.addEventListener('click', () => {
            window.location.href = '/center';
        });

        const vitBtn = document.getElementById('vit-btn');
        vitBtn.addEventListener('click', () => {
            window.location.href = '/vitcodes';
        });

        // Connect to active status websocket
        function connectWebSocket() {
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${proto}//${window.location.host}/ws/connect`;
            const ws = new WebSocket(wsUrl);
            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };
            ws.onerror = () => {
                ws.close();
            };
        }
        connectWebSocket();
    </script>
</body>

</html>
